name: iOS Test

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test · ${{ matrix.device }}
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        device:
          - "iPhone 17 Pro Max"
          - "iPhone 17 Pro"
          - "iPhone 17"
          - "iPhone 17e"

    steps:
      - uses: actions/checkout@v4

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-${{ runner.os }}-${{ matrix.device }}-${{ hashFiles('**/*.swift', 'Since.xcodeproj/project.pbxproj') }}
          restore-keys: |
            deriveddata-${{ runner.os }}-${{ matrix.device }}-
            deriveddata-${{ runner.os }}-

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.4.1.app

      - name: Create signing config
        run: cp -f Config/Signing.xcconfig.example Config/Signing.xcconfig

      - name: Test on ${{ matrix.device }}
        run: |
          xcodebuild test \
            -project Since.xcodeproj \
            -scheme Since \
            -destination "platform=iOS Simulator,name=${{ matrix.device }}" \
            CODE_SIGNING_ALLOWED=NO
