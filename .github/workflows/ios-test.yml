name: iOS Test

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  select-runner:
    runs-on: ubuntu-latest
    outputs:
      runner: ${{ steps.pick.outputs.runner }}
      self_hosted: ${{ steps.pick.outputs.self_hosted }}
    steps:
      - name: Pick runner
        id: pick
        env:
          GH_TOKEN: ${{ secrets.RUNNER_STATUS_TOKEN }}
        run: |
          online=$(gh api "repos/${{ github.repository }}/actions/runners" \
            --jq '[.runners[] | select(.status=="online" and (.labels | map(.name) | contains(["self-hosted","macOS","ARM64"])))] | length')
          if [ "$online" -gt 0 ]; then
            echo 'runner=["self-hosted","macOS","ARM64"]' >> "$GITHUB_OUTPUT"
            echo "self_hosted=true" >> "$GITHUB_OUTPUT"
          else
            echo 'runner=["macos-26"]' >> "$GITHUB_OUTPUT"
            echo "self_hosted=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    name: Test · ${{ matrix.device }}
    needs: select-runner
    runs-on: ${{ fromJson(needs.select-runner.outputs.runner) }}
    strategy:
      fail-fast: false
      matrix:
        device:
          - "iPhone 17 Pro Max"

    steps:
      - uses: actions/checkout@v4

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-${{ runner.os }}-${{ matrix.device }}-${{ hashFiles('**/*.swift', 'Since.xcodeproj/project.pbxproj') }}
          restore-keys: |
            deriveddata-${{ runner.os }}-${{ matrix.device }}-

      - name: Select Xcode
        if: needs.select-runner.outputs.self_hosted != 'true'
        run: sudo xcode-select -s /Applications/Xcode_26.4.1.app

      - name: Create signing config
        run: cp -f Config/Signing.xcconfig.example Config/Signing.xcconfig

      - name: Test on ${{ matrix.device }}
        run: |
          xcodebuild test \
            -project Since.xcodeproj \
            -scheme Since \
            -destination "platform=iOS Simulator,name=${{ matrix.device }}" \
            CODE_SIGNING_ALLOWED=NO
