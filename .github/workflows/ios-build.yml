name: iOS Build

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-${{ runner.os }}-${{ hashFiles('**/*.swift', 'Since.xcodeproj/project.pbxproj') }}
          restore-keys: deriveddata-${{ runner.os }}-

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.6.app

      - name: Create signing config
        run: cp -f Config/Signing.xcconfig.example Config/Signing.xcconfig

      - name: Build
        run: |
          xcodebuild \
            -project Since.xcodeproj \
            -scheme Since \
            -configuration Debug \
            -sdk iphonesimulator \
            CODE_SIGNING_ALLOWED=NO \
            build
